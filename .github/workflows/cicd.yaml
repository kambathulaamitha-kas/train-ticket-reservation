name: ci/cd pipeline to deploy to tomcat
on: 
  push:
    branches: master
jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v3
      
      - name: set-up jdk
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'   # Updated Java version
      
      - name: validate with maven
        run: mvn validate

      - name: compile with maven
        run: mvn compile
      
      - name: test with maven
        run: mvn test
      
      - name: package with maven
        run: mvn clean package

      - name: verify WAR file
        run: ls -lh target/
        
      - name: Sonar scan 
        run: |
        
           mvn clean verify sonar:sonar \
            -Dsonar.projectKey=train-ticket-reservation \
            -Dsonar.host.url="${{ secrets.SONAR_HOST }}" \
            -Dsonar.login="${{ secrets.SONAR_TOKEN }}"name: Build and Deploy train-ticket-reservation

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build & Test with Maven
        run: mvn clean verify

      - name: Upload WAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: war-file
          path: target/*.war

  deploy-DEV:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download WAR artifact
        uses: actions/download-artifact@v4
        with:
          name: war-file

      - name: Deploy to DEV
        env:
          URL: ${{ secrets.TOMCAT_URL_DEV }}
          USER: ${{ secrets.TOMCAT_USER_DEV }}
          PASS: ${{ secrets.TOMCAT_PASS_DEV }}
        run: |
          WAR_FILE=$(ls *.war | head -n 1)
          echo "Deploying $WAR_FILE to DEV ($URL)"
          curl -u "$USER:$PASS" --fail -T "$WAR_FILE" \
            "$URL/deploy?path=/train-ticket-reservation&update=true"

  deploy-TEST:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download WAR artifact
        uses: actions/download-artifact@v4
        with:
          name: war-file

      - name: Deploy to TEST
        env:
          URL: ${{ secrets.TOMCAT_URL_TEST }}
          USER: ${{ secrets.TOMCAT_USER_TEST }}
          PASS: ${{ secrets.TOMCAT_PASS_TEST }}
        run: |
          WAR_FILE=$(ls *.war | head -n 1)
          echo "Deploying $WAR_FILE to TEST ($URL)"
          curl -u "$USER:$PASS" --fail -T "$WAR_FILE" \
            "$URL/deploy?path=/train-ticket-reservation&update=true"

  deploy-PRE_PROD:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download WAR artifact
        uses: actions/download-artifact@v4
        with:
          name: war-file

      - name: Deploy to PRE_PROD
        env:
          URL: ${{ secrets.TOMCAT_URL_PRE_PROD }}
          USER: ${{ secrets.TOMCAT_USER_PRE_PROD }}
          PASS: ${{ secrets.TOMCAT_PASS_PRE_PROD }}
        run: |
          WAR_FILE=$(ls *.war | head -n 1)
          echo "Deploying $WAR_FILE to PRE_PROD ($URL)"
          curl -u "$USER:$PASS" --fail -T "$WAR_FILE" \
            "$URL/deploy?path=/train-ticket-reservation&update=true"

  deploy-PROD:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download WAR artifact
        uses: actions/download-artifact@v4
        with:
          name: war-file

      - name: Deploy to PROD
        env:
          URL: ${{ secrets.TOMCAT_URL_PROD }}
          USER: ${{ secrets.TOMCAT_USER_PROD }}
          PASS: ${{ secrets.TOMCAT_PASS_PROD }}
        run: |
          WAR_FILE=$(ls *.war | head -n 1)
          echo "Deploying $WAR_FILE to PROD ($URL)"
          curl -u "$USER:$PASS" --fail -T "$WAR_FILE" \
            "$URL/deploy?path=/train-ticket-reservation&update=true"
            
